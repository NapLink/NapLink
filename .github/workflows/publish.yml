name: Publish Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25.x'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Resolve package metadata
        id: package_meta
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "Checking version $PACKAGE_VERSION for $PACKAGE_NAME..."
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Check GitHub Packages version
        id: check_gpr
        run: |
          PACKAGE_NAME="${{ steps.package_meta.outputs.package_name }}"
          PACKAGE_VERSION="${{ steps.package_meta.outputs.package_version }}"
          printf '%s\n' \
            "@naplink:registry=https://npm.pkg.github.com" \
            "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" \
            > "$NPM_CONFIG_USERCONFIG"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "GitHub Packages already has ${PACKAGE_NAME}@${PACKAGE_VERSION}, skipping publish."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "GitHub Packages does not have ${PACKAGE_NAME}@${PACKAGE_VERSION}, publish will continue."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/npmrc-gpr-check
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        if: steps.check_gpr.outputs.exists != 'true'
        run: |
          printf '%s\n' \
            "@naplink:registry=https://npm.pkg.github.com" \
            "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" \
            > "$NPM_CONFIG_USERCONFIG"
          pnpm publish --registry https://npm.pkg.github.com --no-git-checks
        env:
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/npmrc-gpr-publish
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check npmjs version
        id: check_npm
        run: |
          PACKAGE_NAME="${{ steps.package_meta.outputs.package_name }}"
          PACKAGE_VERSION="${{ steps.package_meta.outputs.package_version }}"
          printf '%s\n' \
            'registry=https://registry.npmjs.org' \
            '@naplink:registry=https://registry.npmjs.org' \
            > "$NPM_CONFIG_USERCONFIG"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "npmjs already has ${PACKAGE_NAME}@${PACKAGE_VERSION}, skipping publish."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "npmjs does not have ${PACKAGE_NAME}@${PACKAGE_VERSION}, publish will continue."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/npmrc-npm-check

      - name: Publish to npmjs
        if: steps.check_npm.outputs.exists != 'true'
        run: |
          printf '%s\n' \
            'registry=https://registry.npmjs.org' \
            '@naplink:registry=https://registry.npmjs.org' \
            > "$NPM_CONFIG_USERCONFIG"
          npm publish --provenance --access public
        env:
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/npmrc-npm-publish
