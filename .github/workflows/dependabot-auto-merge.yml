name: Dependency Bot Auto Merge

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && (github.event.pull_request.base.ref == 'dev' || github.event.pull_request.base.ref == 'main')
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v1
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for Dependabot PRs (minor/patch)
        if: steps.metadata.outputs.update-type == 'version-update:semver-minor' || steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --merge --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  renovate:
    runs-on: ubuntu-latest
    if: github.actor == 'app/renovate' && (github.event.pull_request.base.ref == 'dev' || github.event.pull_request.base.ref == 'main')
    steps:
      - name: Classify Renovate PR
        id: classify
        run: |
          if printf '%s\n%s\n' "$PR_TITLE" "$PR_BODY" | grep -Eiq '\|\s*[^|]+\s*\|\s*[^|]+\s*\|\s*major\s*\|'; then
            echo "major=true" >> "$GITHUB_OUTPUT"
            echo "Detected major Renovate update, leaving for manual review."
          else
            echo "major=false" >> "$GITHUB_OUTPUT"
            echo "Detected non-major Renovate update, enabling auto-merge."
          fi
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}

      - name: Enable auto-merge for Renovate PRs (non-major)
        if: steps.classify.outputs.major != 'true'
        run: gh pr merge --auto --merge --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
